<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trò chuyện với bạn của tôi</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
#app {
  width: 100%;
  max-width: 480px;
  height: 100vh;
  max-height: 100vh;
  background: #f0f2f5;
  display: flex;
  flex-direction: column;
  position: relative;
}
#header {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  padding: 14px 16px;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
#header .title { display: flex; align-items: center; gap: 8px; }
.hdr-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  padding: 6px 12px;
  border-radius: 16px;
  font-size: 13px;
  cursor: pointer;
  margin-left: 6px;
}
.hdr-btn:hover { background: rgba(255,255,255,0.35); }
#headerBtns { display: flex; }

/* Chat area */
#chatBox {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Screens */
.screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  text-align: center;
}
.screen h2 { color: #333; margin-bottom: 16px; font-size: 22px; }
.screen p { color: #666; margin-bottom: 20px; line-height: 1.6; font-size: 15px; }
.screen input {
  width: 100%;
  max-width: 280px;
  padding: 12px 16px;
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  font-size: 18px;
  text-align: center;
  outline: none;
  margin-bottom: 12px;
}
.screen input:focus { border-color: #667eea; }
.screen .big-btn {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  padding: 12px 32px;
  border-radius: 24px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.screen .big-btn:hover { opacity: 0.9; }
.screen .icon { font-size: 60px; margin-bottom: 16px; }
.screen .error-msg { color: #e74c3c; font-size: 14px; margin-top: 8px; }

/* Welcome */
.welcome {
  text-align: center;
  padding: 30px 20px;
  color: #666;
}
.welcome .icon { font-size: 60px; margin-bottom: 12px; }
.welcome h2 { color: #333; margin-bottom: 8px; font-size: 20px; }
.welcome p { font-size: 14px; line-height: 1.6; }

/* Bubbles */
.msg { display: flex; flex-direction: column; max-width: 82%; }
.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 16px;
  line-height: 1.5;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.msg.ai .bubble {
  background: white;
  color: #333;
  border-bottom-left-radius: 4px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}
.msg.user .bubble {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg .label {
  font-size: 11px;
  color: #999;
  margin-bottom: 3px;
  padding: 0 4px;
}
.msg.user .label { text-align: right; }

/* Typing */
.typing { display: flex; gap: 4px; padding: 10px 14px; }
.typing span {
  width: 8px; height: 8px;
  background: #bbb;
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-8px); }
}

/* Input bar */
#inputBar {
  display: flex;
  padding: 10px;
  background: white;
  border-top: 1px solid #e0e0e0;
  gap: 8px;
  flex-shrink: 0;
}
#msgInput {
  flex: 1;
  padding: 10px 16px;
  border: 2px solid #e0e0e0;
  border-radius: 24px;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
}
#msgInput:focus { border-color: #667eea; }
#sendBtn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#sendBtn:hover { opacity: 0.9; }
#sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }

.error {
  text-align: center;
  color: #e74c3c;
  font-size: 13px;
  padding: 8px;
}

#chatBox::-webkit-scrollbar { width: 6px; }
#chatBox::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

.hidden { display: none !important; }

/* Mic button */
#micBtn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: #e0e0e0;
  color: #555;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#micBtn:hover { background: #d0d0d0; }
#micBtn.recording {
  background: #e74c3c;
  color: white;
  animation: mic-pulse 1s infinite;
}
@keyframes mic-pulse {
  0%   { box-shadow: 0 0 0 0 rgba(231,76,60,0.7); }
  70%  { box-shadow: 0 0 0 10px rgba(231,76,60,0); }
  100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
}

/* Speaker replay button on AI bubble */
.speak-btn {
  background: none;
  border: none;
  font-size: 15px;
  cursor: pointer;
  opacity: 0.45;
  padding: 2px 4px;
  margin-top: 3px;
  align-self: flex-start;
  transition: opacity 0.15s;
}
.speak-btn:hover, .speak-btn.speaking { opacity: 1; }

/* TTS toggle header button muted state */
#ttsToggle.muted { opacity: 0.55; }

@media (max-width: 480px) {
  #app { max-width: 100%; border-radius: 0; }
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="title" id="headerTitle">&#127775; Trò chuyện với bạn của tôi</div>
    <div id="headerBtns">
      <button class="hdr-btn" id="ttsToggle" onclick="toggleTTS()" title="Bật/tắt đọc to">🔊</button>
      <button class="hdr-btn" onclick="clearChat()">Xóa chat</button>
      <button class="hdr-btn" onclick="resetAll()">Đổi tài khoản</button>
    </div>
  </div>

  <!-- Màn hình nhập mật mã -->
  <div class="screen" id="keyScreen">
    <div class="icon">&#128274;</div>
    <h2>Nhập mật mã</h2>
    <p>Hỏi ba mẹ mật mã để vào học nhé!</p>
    <input type="password" id="keyInput" placeholder="Mật mã..." onkeydown="if(event.key==='Enter')submitKey()">
    <br>
    <button class="big-btn" onclick="submitKey()">Vào học</button>
    <div class="error-msg" id="keyError"></div>
  </div>

  <!-- Màn hình nhập tên tuổi -->
  <div class="screen hidden" id="profileScreen">
    <div class="icon">&#128075;</div>
    <h2>Chào bạn mới!</h2>
    <p>Cho mình biết về bạn nhé!</p>
    <input type="text" id="nameInput" placeholder="Tên của bạn..." onkeydown="if(event.key==='Enter')document.getElementById('ageInput').focus()">
    <input type="number" id="ageInput" placeholder="Bạn mấy tuổi?" onkeydown="if(event.key==='Enter')document.getElementById('botNameInput').focus()">
    <input type="text" id="botNameInput" placeholder="Đặt tên cho bạn AI..." onkeydown="if(event.key==='Enter')submitProfile()">
    <br>
    <button class="big-btn" onclick="submitProfile()">Bắt đầu học!</button>
  </div>

  <!-- Chat -->
  <div id="chatBox" class="hidden">
    <div class="welcome" id="welcome">
      <div class="icon">&#128075;</div>
      <h2 id="welcomeName">Xin chào!</h2>
      <p>Hãy nhắn gì đó để bắt đầu học tiếng Anh nhé!</p>
    </div>
  </div>

  <div id="inputBar" class="hidden">
    <button id="micBtn" onclick="toggleMic()" title="Nói tiếng Anh vào mic">🎤</button>
    <input type="text" id="msgInput" placeholder="Nhập hoặc nói tiếng Anh..." autocomplete="off" onkeydown="if(event.key==='Enter')sendMsg()">
    <button id="sendBtn" onclick="sendMsg()">&#10148;</button>
  </div>
</div>

<script>
const WORKER_URL = 'https://chat-proxy.dunglumy.workers.dev';

// ===== STATE =====
let chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '[]');
let appKey = localStorage.getItem('appKey') || '';
let profile = JSON.parse(localStorage.getItem('profile') || 'null');
let sending = false;

// Voice state
let ttsEnabled = localStorage.getItem('ttsEnabled') !== 'false';
let isRecording = false;
let recognition = null;
let currentSpeakBtn = null;
let sttTimeout = null;

const $=id=>document.getElementById(id);

function saveChat() { localStorage.setItem('chatHistory', JSON.stringify(chatHistory)); }
function saveKey(k) { appKey=k; localStorage.setItem('appKey', k); }
function saveProfile(p) { profile=p; localStorage.setItem('profile', JSON.stringify(p)); }

// ===== INIT =====
function init() {
  // Init TTS toggle UI
  const ttsBtn = $('ttsToggle');
  ttsBtn.textContent = ttsEnabled ? '🔊' : '🔇';
  ttsBtn.classList.toggle('muted', !ttsEnabled);
  // Load voices async (needed for some browsers)
  if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = () => {};
  }
  // Init STT
  initSTT();

  if (!appKey) {
    showScreen('keyScreen');
  } else if (!profile) {
    showScreen('profileScreen');
  } else {
    showChat();
  }
}

function showScreen(id) {
  $('keyScreen').classList.add('hidden');
  $('profileScreen').classList.add('hidden');
  $('chatBox').classList.add('hidden');
  $('inputBar').classList.add('hidden');
  $(id).classList.remove('hidden');
}

function updateTitle() {
  const bn = profile ? profile.botName || 'Bạn AI' : 'Bạn AI';
  document.title = 'Trò chuyện với ' + bn;
  $('headerTitle').innerHTML = '&#127775; Trò chuyện với ' + bn;
}

function showChat() {
  $('keyScreen').classList.add('hidden');
  $('profileScreen').classList.add('hidden');
  $('chatBox').classList.remove('hidden');
  $('inputBar').classList.remove('hidden');
  updateTitle();

  // Restore chat
  if (chatHistory.length > 0) {
    const wel = $('welcome');
    if (wel) wel.remove();
    chatHistory.forEach(msg => {
      addBubble(msg.role === 'user' ? 'user' : 'ai', msg.content);
    });
  } else if (profile) {
    $('welcomeName').textContent = 'Xin chào ' + profile.name + '!';
    // Auto-send greeting to start lesson
    autoGreet();
  }
  $('msgInput').focus();
}

// ===== SUBMIT KEY =====
async function submitKey() {
  const key = $('keyInput').value.trim();
  if (!key) return;
  $('keyError').textContent = 'Đang kiểm tra...';

  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, messages: [{ role: 'user', content: 'test' }] })
    });
    const data = await resp.json();
    if (resp.status === 401) {
      $('keyError').textContent = 'Sai mật mã! Hỏi ba mẹ nhé.';
      return;
    }
    // Key OK
    saveKey(key);
    $('keyError').textContent = '';
    if (!profile) {
      showScreen('profileScreen');
      $('nameInput').focus();
    } else {
      showChat();
    }
  } catch (err) {
    $('keyError').textContent = 'Lỗi kết nối! Thử lại sau.';
  }
}

// ===== SUBMIT PROFILE =====
function submitProfile() {
  const name = $('nameInput').value.trim();
  const age = parseInt($('ageInput').value);
  const botName = $('botNameInput').value.trim() || 'Buddy';
  if (!name) { $('nameInput').focus(); return; }
  if (!age || age < 3 || age > 18) { $('ageInput').focus(); return; }

  saveProfile({ name, age, botName, level: null });
  showChat();
}

// ===== AUTO GREET =====
async function autoGreet() {
  const wel = $('welcome');
  if (wel) wel.remove();

  let greetMsg;
  if (!profile.level) {
    greetMsg = 'My name is ' + profile.name + ' and I am ' + profile.age + ' years old. Your name is ' + (profile.botName||'Buddy') + '. This is my first time here. Please greet me like a new friend, then play a fun quiz game with me to see my English level (ask 3-5 fun questions one by one).';
  } else {
    const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    greetMsg = 'Hey friend! Today is ' + today + '. Let\'s hang out and learn some cool new English words today!';
  }

  chatHistory.push({ role: 'user', content: greetMsg });
  addBubble('user', profile.level ? 'Hey! Học tiếp nào! 🙋' : 'Hello! Mình tên ' + profile.name + ', ' + profile.age + ' tuổi! 🙋');

  sending = true;
  $('sendBtn').disabled = true;
  const typingEl = showTyping();

  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: appKey, messages: chatHistory, profile })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    chatHistory.push({ role: 'assistant', content: data.reply });
    saveChat();
    removeTyping(typingEl);
    addBubble('ai', data.reply, true);
  } catch (err) {
    removeTyping(typingEl);
    showError('Lỗi: ' + err.message);
  }
  sending = false;
  $('sendBtn').disabled = false;
}

// ===== GỬI TIN NHẮN =====
async function sendMsg() {
  const input = $('msgInput');
  const text = input.value.trim();
  if (!text || sending) return;

  const wel = $('welcome');
  if (wel) wel.remove();

  chatHistory.push({ role: 'user', content: text });
  saveChat();
  addBubble('user', text);
  input.value = '';
  input.focus();

  sending = true;
  $('sendBtn').disabled = true;
  const typingEl = showTyping();

  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: appKey, messages: chatHistory, profile })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    const reply = data.reply;
    chatHistory.push({ role: 'assistant', content: reply });
    saveChat();
    removeTyping(typingEl);
    addBubble('ai', reply, true);

    // Detect level from AI response (placement test result)
    if (!profile.level) {
      const lvlMatch = reply.match(/level[:\s]*(beginner|elementary|pre-intermediate)/i);
      if (lvlMatch) {
        profile.level = lvlMatch[1].toLowerCase();
        saveProfile(profile);
      }
    }

  } catch (err) {
    removeTyping(typingEl);
    showError('Lỗi: ' + err.message);
  }
  sending = false;
  $('sendBtn').disabled = false;
}

// ===== RENDER =====
function addBubble(type, text, autoSpeak) {
  const box = $('chatBox');
  const div = document.createElement('div');
  div.className = 'msg ' + type;

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = type === 'ai' ? ('🤖 ' + (profile ? profile.botName || 'Bạn AI' : 'Bạn AI')) : ('👧 ' + (profile ? profile.name : 'Bé'));

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  div.appendChild(label);
  div.appendChild(bubble);

  if (type === 'ai') {
    const speakBtn = document.createElement('button');
    speakBtn.className = 'speak-btn';
    speakBtn.textContent = '🔊';
    speakBtn.title = 'Nghe lại';
    speakBtn.onclick = () => {
      if (speakBtn.classList.contains('speaking')) {
        window.speechSynthesis.cancel();
        speakBtn.textContent = '🔊';
        speakBtn.classList.remove('speaking');
        currentSpeakBtn = null;
      } else {
        speakText(text, speakBtn);
      }
    };
    div.appendChild(speakBtn);
    if (autoSpeak && ttsEnabled) speakText(text, speakBtn);
  }

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = $('chatBox');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = '<div class="label">🤖 ' + (profile ? profile.botName || 'Bạn AI' : 'Bạn AI') + '</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

function removeTyping(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }

function showError(msg) {
  const box = $('chatBox');
  const div = document.createElement('div');
  div.className = 'error';
  div.textContent = msg;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ===== XÓA CHAT =====
function clearChat() {
  chatHistory = [];
  saveChat();
  $('chatBox').innerHTML = '';
  if (profile) {
    $('chatBox').innerHTML = '<div class="welcome" id="welcome"><div class="icon">&#128075;</div><h2>Xin chào ' + profile.name + '!</h2><p>Hãy nhắn gì đó để tiếp tục học nhé!</p></div>';
  }
}

// ===== RESET ALL =====
function resetAll() {
  if (!confirm('Xóa hết dữ liệu và bắt đầu lại?')) return;
  localStorage.removeItem('appKey');
  localStorage.removeItem('profile');
  localStorage.removeItem('chatHistory');
  location.reload();
}

// ===== TEXT-TO-SPEECH =====
function cleanForTTS(text) {
  return text
    .replace(/[\u{1F300}-\u{1FAFF}]/gu, '')
    .replace(/[\u{2600}-\u{27BF}]/gu, '')
    .replace(/[*_~`#]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function speakText(text, btn) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  if (currentSpeakBtn && currentSpeakBtn !== btn) {
    currentSpeakBtn.textContent = '🔊';
    currentSpeakBtn.classList.remove('speaking');
  }
  // If same button clicked while speaking → just cancel (already done above)
  if (!ttsEnabled && !btn) return;
  const clean = cleanForTTS(text);
  if (!clean) return;
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'en-US';
  utter.rate = 1.15;
  utter.pitch = 1.7;
  const voices = window.speechSynthesis.getVoices();
  // Desktop voices support pitch/rate; Online (Natural) voices ignore them
  const enVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Desktop') && v.name.includes('Zira'))
    || voices.find(v => v.lang === 'en-US' && v.name.includes('Desktop'))
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang.startsWith('en'));
  if (enVoice) utter.voice = enVoice;
  if (btn) { btn.textContent = '⏸'; btn.classList.add('speaking'); currentSpeakBtn = btn; }
  utter.onend = () => {
    if (btn) { btn.textContent = '🔊'; btn.classList.remove('speaking'); }
    if (currentSpeakBtn === btn) currentSpeakBtn = null;
  };
  utter.onerror = () => {
    if (btn) { btn.textContent = '🔊'; btn.classList.remove('speaking'); }
  };
  window.speechSynthesis.speak(utter);
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  localStorage.setItem('ttsEnabled', ttsEnabled);
  const btn = $('ttsToggle');
  btn.textContent = ttsEnabled ? '🔊' : '🔇';
  btn.classList.toggle('muted', !ttsEnabled);
  if (!ttsEnabled) window.speechSynthesis.cancel();
}

// ===== SPEECH-TO-TEXT =====
function initSTT() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { $('micBtn').style.display = 'none'; return; }
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.continuous = true;

  recognition.onresult = (e) => {
    let transcript = '';
    for (let i = 0; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    const inp = $('msgInput');
    inp.value = transcript;
    inp.style.color = e.results[e.results.length - 1].isFinal ? '' : '#aaa';
    // Chờ 3 giây im lặng rồi mới tự dừng và gửi
    clearTimeout(sttTimeout);
    sttTimeout = setTimeout(() => {
      if (isRecording) recognition.stop();
    }, 3000);
  };

  recognition.onend = () => {
    clearTimeout(sttTimeout);
    isRecording = false;
    $('micBtn').classList.remove('recording');
    $('micBtn').textContent = '🎤';
    const inp = $('msgInput');
    inp.style.color = '';
    if (inp.value.trim() && !sending) sendMsg();
  };

  recognition.onerror = () => {
    isRecording = false;
    $('micBtn').classList.remove('recording');
    $('micBtn').textContent = '🎤';
    $('msgInput').style.color = '';
  };
}

function toggleMic() {
  if (!recognition) return;
  if (isRecording) {
    recognition.stop();
  } else {
    window.speechSynthesis.cancel();
    clearTimeout(sttTimeout);
    $('msgInput').value = '';
    isRecording = true;
    $('micBtn').classList.add('recording');
    $('micBtn').textContent = '🛑';
    recognition.start();
  }
}

// Start
init();
</script>
</body>
</html>
