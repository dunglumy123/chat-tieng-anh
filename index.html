<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Tiếng Anh</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
#app {
  width: 100%;
  max-width: 480px;
  height: 100vh;
  max-height: 100vh;
  background: #f0f2f5;
  display: flex;
  flex-direction: column;
  position: relative;
}
/* Header */
#header {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  padding: 14px 16px;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
#header .title { display: flex; align-items: center; gap: 8px; }
#clearBtn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  padding: 6px 12px;
  border-radius: 16px;
  font-size: 14px;
  cursor: pointer;
}
#clearBtn:hover { background: rgba(255,255,255,0.35); }

/* Chat area */
#chatBox {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Welcome message */
.welcome {
  text-align: center;
  padding: 30px 20px;
  color: #666;
}
.welcome .icon { font-size: 60px; margin-bottom: 12px; }
.welcome h2 { color: #333; margin-bottom: 8px; font-size: 20px; }
.welcome p { font-size: 14px; line-height: 1.6; }

/* Bubbles */
.msg { display: flex; flex-direction: column; max-width: 82%; }
.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; }

.bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 16px;
  line-height: 1.5;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.msg.ai .bubble {
  background: white;
  color: #333;
  border-bottom-left-radius: 4px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}
.msg.user .bubble {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg .label {
  font-size: 11px;
  color: #999;
  margin-bottom: 3px;
  padding: 0 4px;
}
.msg.user .label { text-align: right; }

/* Typing indicator */
.typing { display: flex; gap: 4px; padding: 10px 14px; }
.typing span {
  width: 8px; height: 8px;
  background: #bbb;
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-8px); }
}

/* Input bar */
#inputBar {
  display: flex;
  padding: 10px;
  background: white;
  border-top: 1px solid #e0e0e0;
  gap: 8px;
  flex-shrink: 0;
}
#msgInput {
  flex: 1;
  padding: 10px 16px;
  border: 2px solid #e0e0e0;
  border-radius: 24px;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
}
#msgInput:focus { border-color: #667eea; }
#sendBtn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#sendBtn:hover { opacity: 0.9; }
#sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Error */
.error {
  text-align: center;
  color: #e74c3c;
  font-size: 13px;
  padding: 8px;
}

/* Scrollbar */
#chatBox::-webkit-scrollbar { width: 6px; }
#chatBox::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

/* Mobile */
@media (max-width: 480px) {
  #app { max-width: 100%; border-radius: 0; }
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="title">&#127775; Chat Tiếng Anh</div>
    <button id="clearBtn" onclick="clearChat()">Xóa chat</button>
  </div>

  <div id="chatBox">
    <div class="welcome" id="welcome">
      <div class="icon">&#128075;</div>
      <h2>Xin chào bé!</h2>
      <p>Hãy nhắn gì đó để bắt đầu học tiếng Anh nhé!<br>
      Bé có thể viết tiếng Việt hoặc tiếng Anh đều được &#128522;</p>
    </div>
  </div>

  <div id="inputBar">
    <input type="text" id="msgInput" placeholder="Nhập tin nhắn..." autocomplete="off" onkeydown="if(event.key==='Enter')sendMsg()">
    <button id="sendBtn" onclick="sendMsg()">&#10148;</button>
  </div>
</div>

<script>
// ===== CẤU HÌNH =====
// Thay URL này bằng URL Cloudflare Worker của bạn
const WORKER_URL = 'https://chat-proxy.dunglumy.workers.dev';

// ===== STATE =====
let chatHistory = [];
let sending = false;

const $=id=>document.getElementById(id);

// ===== GỬI TIN NHẮN =====
async function sendMsg() {
  const input = $('msgInput');
  const text = input.value.trim();
  if (!text || sending) return;

  // Hide welcome
  const wel = $('welcome');
  if (wel) wel.remove();

  // Add user message
  chatHistory.push({ role: 'user', content: text });
  addBubble('user', text);
  input.value = '';
  input.focus();

  // Show typing
  sending = true;
  $('sendBtn').disabled = true;
  const typingEl = showTyping();

  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatHistory })
    });

    const data = await resp.json();

    if (data.error) throw new Error(data.error);

    const reply = data.reply;
    chatHistory.push({ role: 'assistant', content: reply });
    removeTyping(typingEl);
    addBubble('ai', reply);

  } catch (err) {
    removeTyping(typingEl);
    showError('Lỗi: ' + err.message);
  }

  sending = false;
  $('sendBtn').disabled = false;
}

// ===== RENDER =====
function addBubble(type, text) {
  const box = $('chatBox');
  const div = document.createElement('div');
  div.className = 'msg ' + type;

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = type === 'ai' ? '🤖 Cô giáo AI' : '👧 Bé';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  div.appendChild(label);
  div.appendChild(bubble);
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = $('chatBox');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = '<div class="label">🤖 Cô giáo AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

function removeTyping(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }

function showError(msg) {
  const box = $('chatBox');
  const div = document.createElement('div');
  div.className = 'error';
  div.textContent = msg;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ===== XÓA CHAT =====
function clearChat() {
  chatHistory = [];
  $('chatBox').innerHTML = `
    <div class="welcome" id="welcome">
      <div class="icon">&#128075;</div>
      <h2>Xin chào bé!</h2>
      <p>Hãy nhắn gì đó để bắt đầu học tiếng Anh nhé!<br>
      Bé có thể viết tiếng Việt hoặc tiếng Anh đều được &#128522;</p>
    </div>`;
}

// Focus input on load
$('msgInput').focus();
</script>
</body>
</html>
